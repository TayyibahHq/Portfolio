name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments, skipping in-progress runs if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Build the project and package artifacts
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Upgrade to v4 for pnpm v10+ support
      - name: Install pnpm
        uses: pnpm/action-setup@v4


      # Uses built-in node/pnpm caching directly
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Double-check this folder path! (Common Vite/React builds output to './dist')
          path: './dist/public'

  # Job 2: Deploy the uploaded artifact to Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3